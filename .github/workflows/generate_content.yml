name: Generate Content

on:
  schedule:
    - cron: '0 13 * * *' # Roz Indian Time (IST) ke mutabik 6:30 PM par chalega
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  run-automation:
    runs-on: ubuntu-latest
    
    # CRITICAL: Permission granted for committing/pushing changes back to repo
    permissions:
      contents: write

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v5
      with:
        fetch-depth: 0 # Full history fetch karega safe dynamic push ke liye

    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: '3.11'

    - name: Configure Git
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"

    - name: Pull Latest Changes (Maintain Persistence)
      run: |
        git pull origin ${GITHUB_REF_NAME} --rebase

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install playwright playwright-stealth cryptography python-dotenv
        playwright install chromium --with-deps

    - name: Run Script
      env:
        DECRYPT_KEY: ${{ secrets.DECRYPT_KEY }} # Ensure this is added in GitHub Secrets
      run: |
        python generate_content.py

    - name: Upload Error Screenshot
      if: failure() # Run only if python script crashes
      uses: actions/upload-artifact@v4
      with:
        name: playwright-error-screenshot
        path: error_screenshot.png
        if-no-files-found: ignore

    - name: Commit and Push Changes (If updated)
      if: always() # Chalna chahiye chahe upar steps partial fail ho ya modify ho chuke hon
      run: |
        # Only stage files if they exist to prevent 'pathspec' errors
        [ -f reddit_post.json ] && git add reddit_post.json
        [ -f topics.txt ] && git add topics.txt
        [ -f status.json ] && git add status.json
        
        if git diff --staged --quiet; then
          echo "[INFO] No changes detected. Skipping push."
        else
          echo "[OK] Changes detected. Committing and pushing updates..."
          git commit -m "Automated: Update article and topics list [skip ci]"
          git push origin ${GITHUB_REF_NAME}
        fi